            margin-bottom: 8px;
        }

        }
        .question-group:last-of-type {

        }

        .q-item:hover {
            background: #f1f5f9;
        }

            font-weight: 500;
            font-size: 16px;
            margin-bottom: 10px;
            display: block;
        }

            gap: 12px 24px;
        }

            align-items: center;
            gap: 6px;
            font-size: 15px;
            cursor: pointer;
            color: #334155;
        }
        .q-options input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: #3b82f6;
            flex-shrink: 0;
            cursor: pointer;
        }

            margin-top: 32px;

        }

            font-weight: 600;
            cursor: pointer;

            background: #e2e8f0;
            color: #1e293b;
        }
        .btn-primary {
            background: #3b82f6;
            color: white;
            box-shadow: 0 4px 12px rgba(59,130,246,0.3);
        }
        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59,130,246,0.35);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background: #e2e8f0;
            color: #1e293b;
        }
        .btn-secondary:hover {
            background: #cbd5e1;
        }
        #result-area {
            margin-top: 40px;
            border-top: 2px solid #e2e8f0;
            padding-top: 32px;
            display: none;
        }
        .result-block {
            background: #f8fafc;
            border-radius: 20px;
            padding: 24px 28px;
            margin-bottom: 20px;
        }
        .result-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #0f172a;
        }
        .dimension-result {
            margin-bottom: 20px;
        }
        .dimension-result:last-child {
            margin-bottom: 0;
        }

            display: flex;
            justify-content: space-between;
            font-size: 15px;
            font-weight: 500;

            position: relative;
            display: flex;
        }

            background: #3b82f6;
            height: 100%;
            transition: width 0.5s ease;
            border-radius: 40px 0 0 40px;
        }

            background: #8b5cf6;

            transition: width 0.5s ease;

        }

            position: absolute;
            left: 50%;
            top: 0;
            height: 100%;
            width: 2px;
            background: rgba(255,255,255,0.6);
            pointer-events: none;
        }

            background: linear-gradient(135deg, #dbeafe, #ede9fe);
            border-radius: 20px;
            padding: 24px 28px;
            margin-top: 20px;
        }

            font-size: 24px;
            font-weight: 700;
            color: #1e293b;
        }
        .personality-name {
            font-size: 28px;
            font-weight: 800;
            color: #0f172a;
            margin: 6px 0 12px;

        .personality-desc {

            line-height: 1.7;
            white-space: pre-wrap;
            color: #1e293b;
        }
        .footnote {
            margin-top: 16px;
            font-size: 14px;
            color: #64748b;
            text-align: center;
        }
        .error-msg {
            color: #dc2626;
            font-size: 15px;
            margin-top: 12px;
            font-weight: 500;
        }

                gap: 8px 16px;
            }

                font-size: 14px;
            }
            .btn {
                width: 100%;
                justify-content: center;
            }
        }

</head>

    <div id="error-msg" class="error-msg"></div>

    // 维度标签
    const dimLabels = [
        { left: "简洁", right: "多维", leftShort: "简", rightShort: "多" },
        { left: "灵动", right: "持久", leftShort: "灵", rightShort: "持" },
        { left: "外排", right: "内驱", leftShort: "外", rightShort: "内" },
        { left: "全面", right: "精巧", leftShort: "全", rightShort: "精" },
        { left: "饱满", right: "节能", leftShort: "饱", rightShort: "节" }
    ];

    // ========== 渲染题目 ==========
    function renderQuestions() {
        const container = document.getElementById('questions-container');
        let html = '';
        for (let d = 1; d <= 5; d++) {
            const qs = questions.filter(q => q.dim === d);
            const label = dimLabels[d-1];
            html += `<div class="question-group"><div class="dimension-tag">维度 ${d}：${label.left} ↔ ${label.right}</div>`;
            qs.forEach(q => {
                const id = 'q' + q.id;
                html += `<div class="q-item"><span class="q-text">${q.id}. ${q.text}</span><div class="q-options">`;
                q.options.forEach(opt => {
                    const val = opt.score;
                    html += `<label><input type="radio" name="${id}" value="${val}" required> ${opt.label}</label>`;
                });
                html += `</div></div>`;
            });
            html += `</div>`;
        }
        container.innerHTML = html;
    }

    // ========== 提交逻辑 ==========
    document.getElementById('submitBtn').addEventListener('click', function() {
        const errorMsg = document.getElementById('error-msg');
        errorMsg.textContent = '';

        let allAnswered = true;
        let firstUnanswered = null;
        questions.forEach(q => {
            const name = 'q' + q.id;
            const checked = document.querySelector(`input[name="${name}"]:checked`);
            if (!checked) {
                allAnswered = false;
                if (!firstUnanswered) firstUnanswered = q.id;
            }
        });

        if (!allAnswered) {
            errorMsg.textContent = `⚠️ 还有题目未作答（如第 ${firstUnanswered} 题），请完成所有题目。`;
            const firstEl = document.querySelector(`input[name="q${firstUnanswered}"]`);
            if (firstEl) {
                firstEl.closest('.q-item').scrollIntoView({ behavior: 'smooth', block: 'center' });
                firstEl.closest('.q-item').style.borderLeftColor = '#dc2626';
                setTimeout(() => { firstEl.closest('.q-item').style.borderLeftColor = ''; }, 2000);
            }
            return;
        }

        const dimScores = [0,0,0,0,0];
        questions.forEach(q => {
            const name = 'q' + q.id;
            const checked = document.querySelector(`input[name="${name}"]:checked`);
            if (checked) {
                const score = parseInt(checked.value);
                dimScores[q.dim] += score;
            }
        });

        showResults(dimScores);
    });

    // ========== 显示结果 ==========
    function showResults(scores) {
        const resultArea = document.getElementById('result-area');
        resultArea.style.display = 'block';

        const dimResults = document.getElementById('dimension-results');
        let html = '';
        const maxScore = 35;
        const chosen = [];

        for (let i = 0; i < 5; i++) {
            const s = scores[i+1];
            const label = dimLabels[i];
            let leftPct = 0, rightPct = 0;
            if (s > 0) {
                rightPct = (s / maxScore) * 100;
                leftPct = 100 - rightPct;
                chosen.push(label.right);
            } else if (s < 0) {
                leftPct = (Math.abs(s) / maxScore) * 100;
                rightPct = 100 - leftPct;
                chosen.push(label.left);
            } else {
                leftPct = 50;
                rightPct = 50;
                chosen.push(label.left);
            }
            leftPct = Math.round(leftPct * 10) / 10;
            rightPct = Math.round(rightPct * 10) / 10;

            html += `<div class="dimension-result">
                <div class="dim-label">
                    <span class="left">${label.left} ${leftPct}%</span>
                    <span class="right">${label.right} ${rightPct}%</span>
                </div>
                <div class="bar-bg">
                    <div class="bar-fill-left" style="width: ${leftPct}%;"></div>
                    <div class="bar-fill-right" style="width: ${rightPct}%;"></div>
                    <div class="bar-center-line"></div>
                </div>
                <div style="font-size:13px; color:#64748b; margin-top:2px;">得分：${s} 分</div>
            </div>`;
        }
        dimResults.innerHTML = html;

        const typeKey = chosen.join('-');
        const typeInfo = typeData[typeKey];

        if (typeInfo) {
            document.getElementById('result-code').textContent = typeKey.replace(/-/g, ' · ');
            document.getElementById('result-name').textContent = typeInfo.code;
            document.getElementById('result-desc').textContent = typeInfo.desc;
        } else {
            document.getElementById('result-code').textContent = typeKey.replace(/-/g, ' · ');
            document.getElementById('result-name').textContent = '均衡型（多维倾向不显著）';
            document.getElementById('result-desc').textContent = '你的各项维度倾向较为均衡，可能在不同情境下表现出不同的特质。建议结合具体情境进一步探索。';
        }

        resultArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // ========== 重置 ==========
    document.getElementById('resetBtn').addEventListener('click', function() {
        document.querySelectorAll('input[type="radio"]').forEach(el => el.checked = false);
        document.getElementById('result-area').style.display = 'none';
        document.getElementById('error-msg').textContent = '';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    renderQuestions();
</script>
</body>
</html>
