            top: 0;
            height: 100%;

</head>

    function renderQuestions() {
        const container = document.getElementById('questions-container');
        let html = '';
        for (let d = 1; d <= 5; d++) {
            const qs = questions.filter(q => q.dim === d);
            const label = dimLabels[d-1];
            const leftTag = `${label.left} (${label.leftPart})`;
            const rightTag = `${label.right} (${label.rightPart})`;
            html += `<div class="question-group"><div class="dimension-tag">维度 ${d}：${leftTag} ↔ ${rightTag}</div>`;
            qs.forEach(q => {
                const id = 'q' + q.id;
                html += `<div class="q-item"><span class="q-text">${q.id}. ${q.text}</span><div class="q-options">`;
                q.options.forEach(opt => {
                    const val = opt.score;
                    html += `<label><input type="radio" name="${id}" value="${val}" required> ${opt.label}</label>`;
                });
                html += `</div></div>`;
            });
            html += `</div>`;
        }
        container.innerHTML = html;
    }

    // ========== 提交逻辑 ==========
    document.getElementById('submitBtn').addEventListener('click', function() {
        const errorMsg = document.getElementById('error-msg');
        errorMsg.textContent = '';

        let allAnswered = true;
        let firstUnanswered = null;
        questions.forEach(q => {
            const name = 'q' + q.id;
            const checked = document.querySelector(`input[name="${name}"]:checked`);
            if (!checked) {
                allAnswered = false;
                if (!firstUnanswered) firstUnanswered = q.id;
            }
        });

        if (!allAnswered) {
            errorMsg.textContent = `⚠️ 还有题目未作答（如第 ${firstUnanswered} 题），请完成所有题目。`;
            const firstEl = document.querySelector(`input[name="q${firstUnanswered}"]`);
            if (firstEl) {
                firstEl.closest('.q-item').scrollIntoView({ behavior: 'smooth', block: 'center' });
                firstEl.closest('.q-item').style.borderLeftColor = '#dc2626';
                setTimeout(() => { firstEl.closest('.q-item').style.borderLeftColor = ''; }, 2000);
            }
            return;
        }

        const dimScores = [0,0,0,0,0];
        questions.forEach(q => {
            const name = 'q' + q.id;
            const checked = document.querySelector(`input[name="${name}"]:checked`);
            if (checked) {
                const score = parseInt(checked.value);
                dimScores[q.dim - 1] += score;
            }
        });

        showResults(dimScores);
    });

    // ========== 显示结果 ==========
    function showResults(scores) {
        const resultArea = document.getElementById('result-area');
        resultArea.style.display = 'block';

        const maxScore = 70;
        const chosen = [];        // 中文全称
        const letterCode = [];    // 字母代码
        const pcts = [];

        for (let i = 0; i < 5; i++) {
            const s = scores[i];
            const label = dimLabels[i];
            const letters = dimLetters[i];
            let leftPct = 0, rightPct = 0;
            if (s > 0) {
                rightPct = ((s+35) / maxScore) * 100;
                leftPct = 100 - rightPct;
                chosen.push(label.right);
                letterCode.push(letters.right);
            } else if (s < 0) {
                leftPct = ((Math.abs(s)+35) / maxScore) * 100;
                rightPct = 100 - leftPct;
                chosen.push(label.left);
                letterCode.push(letters.left);
            } else {
                leftPct = 50;
                rightPct = 50;
                chosen.push(label.left);
                letterCode.push(letters.left);
            }
            leftPct = Math.round(leftPct * 10) / 10;
            rightPct = Math.round(rightPct * 10) / 10;
            pcts.push({ leftPct, rightPct, score: s });
        }

        // 1. 人格类型
        const typeKey = chosen.join('-');
        const typeInfo = typeData[typeKey];
        const codeStr = letterCode.slice(0,4).join('') + '-' + letterCode[4];
        const codeDisplay = typeKey.replace(/-/g, ' · ') + '  (' + codeStr + ')';

        if (typeInfo) {
            document.getElementById('result-code').textContent = codeDisplay;
            document.getElementById('result-name').textContent = typeInfo.code;
            document.getElementById('result-desc').textContent = typeInfo.desc;
        } else {
            document.getElementById('result-code').textContent = codeDisplay;
            document.getElementById('result-name').textContent = '均衡型（维度倾向不显著）';
            document.getElementById('result-desc').textContent = '你的各项维度倾向较为均衡，可能在不同情境下表现出不同的特质。建议结合具体情境进一步探索。';
        }

        // 2. 维度倾向（加入部件名称）
        const dimResults = document.getElementById('dimension-results');
        let html = '';
        for (let i = 0; i < 5; i++) {
            const s = pcts[i].score;
            const leftPct = pcts[i].leftPct;
            const rightPct = pcts[i].rightPct;
            const label = dimLabels[i];
            const leftLabel = `${label.left} (${label.leftPart})`;
            const rightLabel = `${label.right} (${label.rightPart})`;
            html += `<div class="dimension-result">
                <div class="dim-label">
                    <span class="left">${leftLabel} ${leftPct}%</span>
                    <span class="right">${rightLabel} ${rightPct}%</span>
                </div>
                <div class="bar-bg">
                    <div class="bar-fill-left" style="width: ${leftPct}%;"></div>
                    <div class="bar-fill-right" style="width: ${rightPct}%;"></div>
                    <div class="bar-center-line"></div>
                </div>
                <div style="font-size:13px; color:#64748b; margin-top:2px;">得分：${s} 分</div>
            </div>`;
        }
        dimResults.innerHTML = html;

        resultArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // ========== 重置 ==========
    document.getElementById('resetBtn').addEventListener('click', function() {
        document.querySelectorAll('input[type="radio"]').forEach(el => el.checked = false);
        document.getElementById('result-area').style.display = 'none';
        document.getElementById('error-msg').textContent = '';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    renderQuestions();
</script>
</body>
</html>
